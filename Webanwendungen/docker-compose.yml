version: "3.8"

services:
  postgres:
    image: postgres:latest
    container_name: pg-payara
    restart: unless-stopped
    environment:
      POSTGRES_USER: payara_user
      POSTGRES_PASSWORD: payara_pass
      POSTGRES_DB: payara_db
    volumes:
      # - ./pgdata:/var/lib/postgresql:z
      - ~/dev/temp/pgdata:/var/lib/postgresql:z # linux system workaround
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB} -h localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  payara:
    image: payara/server-full:latest  # choose an appropriate Payara image; update tag if needed
    container_name: payara
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
      - "4848:4848"
      - "9009:9009"
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: payara_db
      DB_USER: payara_user
      DB_PASSWORD: payara_pass
      JDBC_POOL_NAME: PayaraPostgresPool
      JDBC_RESOURCE_NAME: jdbc/payaraDS
      JAVA_DEBUGGER_PORT: "9009"
      PAYARA_ARGS: "--debug"
    volumes:
      # Load war files from deployments directory
      - ./deployments:/opt/payara/deployments
      # autodeploy demo app (myapp)
      - ./demo/target/myapp:/opt/payara/appserver/glassfish/domains/domain1/autodeploy/myapp
      - ./asadmin-scripts:/opt/payara/asadmin-scripts
      - ./demo:/opt/payara/demo
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -euo pipefail
        /opt/payara/asadmin-scripts/setup-jdbc.sh

volumes:
  pgdata:
