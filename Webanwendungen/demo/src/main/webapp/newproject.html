<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Colin,Jan">
    <meta name="application-name" content="StudBoard">
    <meta name="revisit-after" content="1">
    <title>StudBoard</title>
    <link rel="stylesheet" href="/myapp/main.css">
</head>

<body>
    <!-- Header -->
    <header id="header">

        <picture>
            <source media="(min-width: 1920px)" srcset="/myapp/res/header1920x200.png">
            <source media="(min-width: 1280px)" srcset="/myapp/res/header1280x133.png">
            <source media="(min-width: 640px)" srcset="/myapp/res/header640x67.png">
            <img src="/myapp/res/header320x34.png">
        </picture>

        <div class="login-area">
            <b>Login</b>
            <form action="/myapp/submit" method="post">
                <!-- <legend>Login</legend> -->
                <fieldset>
                    <label for="name">Username</label>
                    <input id="name" name="name" type="text"/> <br/>

                    <label for="password">Password</label>
                    <input id="password" name="password" type="password"/> <br/>

                    <input type="submit" value="Login"/> 
                </fieldset>
            </form>
            
            <span>Neu hier? <a href="register">Registrieren</a></span>
        </div>

    </header>

    <nav class="main-nav hover-link">
        <ul>
            <li><a href="/myapp/"><img src="/myapp/res/startseite.svg" style="max-height: 1.0em;"/></a></li>
            <li><a href="/myapp/projects.html">Projekte</a></li>
            <li><a href="/myapp/newproject.html">Neues Projekt</a></li>
        </ul>
    </nav>
    
    
    
    <!-- Main Content -->
    <main>
        

        <form class="new-project-form" action="/myapp/newproject.html" method="post" enctype="multipart/form-data">

            <div class="prj-header">

                <div>
                    <label for="logo" class="logo-placeholder">
                        Logo auswählen
                    </label>
                    <input id="logo" name="logo" type="file" accept="image/png, image/jpeg">

                    <input id="title" name="title" type="text" placeholder="Projekttitel" class="new-project-title">
                </div>

                <label>
                    Projektleiter:
                    <input name="leader" type="text" placeholder="Name">
                </label>

            </div>

            <table class="new-project-table">

                <tr>
                    <td><strong>Startdatum:</strong></td>
                    <td><input id="start" name="start" type="date"></td>
                </tr>

                <tr>
                    <td><strong>Enddatum:</strong></td>
                    <td><input id="end" name="end" type="date"></td>
                </tr>

                <tr>
                    <td><strong>Thema:</strong></td>
                    <td><textarea id="topic" name="topic" class="full-width-input"></textarea></td>
                </tr>

                <tr>
                    <td><strong>Beschreibung:</strong></td>
                    <td><textarea id="description" name="description" class="full-width-input"></textarea></td>
                </tr>

                <tr>
                    <td><strong>Ziele:</strong></td>
                    <td>
                        <input id="goal1" name="goal1" type="text" placeholder="Ziel 1">
                        <input id="goal2" name="goal2" type="text" placeholder="Ziel 2">
                    </td>
                </tr>

            </table>

            <input type="submit" value="Erstellen">

        </form>

        
    </main>
    
    <!-- Footer -->
    <footer>
        <nav>
            <ul>
                <li><a href="impresum">Impressum</a></li>
                <li><a href="dsgvo">Datenschutzerklärung</a></li>
                <li><a href="haftung">Haftungsausschluss</a></li>
            </ul>

            <div class="back-to-top">
                <a href="#header">Zurück zum Anfang</a> 
            </div>
        </nav>
        <p>&copy; 2026 StudBoard. All rights reserved. Kontakt: <a href="mailto:studboard@hsbi.de">hier</a></p>    
        <br/>    
    </footer>
</body>
</html>
