<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Colin,Jan">
    <meta name="application-name" content="StudBoard">
    <meta name="revisit-after" content="1">
    <title>StudBoard</title>
    <link rel="stylesheet" href="/myapp/main.css">
</head>

<body>
    <!-- Header -->
    <header id="header">
        <picture>
            <source media="(min-width: 1920px)" srcset="/myapp/res/header1920x200.png">
            <source media="(min-width: 1280px)" srcset="/myapp/res/header1280x133.png">
            <source media="(min-width: 640px)" srcset="/myapp/res/header640x67.png">
            <img src="/myapp/res/header320x34.png">
        </picture>

        <nav>
            <ul>
                <li><a href="/myapp/index.html"><img src="/myapp/res/startseite.svg" style="max-height: 1.5em;"/></a></li>
                <li><a href="/myapp/projects.html">Projekte</a></li>
                <li><a href="/myapp/newproject.html">Neues Projekt</a></li>
            </ul>
        </nav>
    </header>
    
    
    
    <!-- Main Content -->
    <main class="container">
        
        <section>
            <!-- <jsp:include page="${requestScope.page}" />     -->
            <h1>Neues Projekt erstellen</h1>

            <form action="/myapp/projects.html" method="post" enctype="multipart/form-data">
                <fieldset>
                    <label for="title">Titel</label>
                    <input id="title" name="title" type="text"/>
                    <br/>
                
                    <label for="start">Startdatum</label>
                    <input id="start" name="start" type="date"/>
                    <br/>

                    <label for="end">Enddatum</label>
                    <input id="end" name="end" type="date"/>
                    <br/>

                    <label for="topic">Kurzbeschreibung</label>
                    <input id="topic" name="topic" type="text"/>
                    <br/>

                    <label for="description">Beschreibung</label>
                    <textarea id="description" name="description"></textarea> 
                    <br/>

                    <label for="goal1">Ziel 1</label>
                    <select id="goal1" name="goal1">
                        <option value="goal_abc">Ziel ABC</option>
                        <option value="goal_def">Ziel DEF</option>
                        <option value="goal_ghi">Ziel GHI</option>
                        <option value="goal_jkl">Ziel JKL</option>
                    </select>
                    <br/>

                    <label for="goal2">Ziel 2</label>
                    <select id="goal2" name="goal2">
                        <option value="goal_abc">Ziel ABC</option>
                        <option value="goal_def">Ziel DEF</option>
                        <option value="goal_ghi">Ziel GHI</option>
                        <option value="goal_jkl">Ziel JKL</option>
                    </select>
                    <br>

                    <label for="logo">Logo</label>
                    <input id="logo" name="logo" type="file" accept="image/png, image/jpeg">
                </fieldset>

                <input type="submit" value="Erstellen"/> 
            </form>
        </section>
        
    </main>

    <section>
        <div>
            <h3>Login</h3>
            <form action="/myapp/login.html" method="post">
                <!-- <legend>Login</legend> -->
                <fieldset>
                    <label for="name">Username</label>
                    <input id="name" name="name" type="text"/>

                    <label for="password">Password</label>
                    <input id="password" name="password" type="password"/>

                    <input type="submit" value="Login"/> 
                </fieldset>
            </form>
            
            <span>Neu hier? <a href="/myapp/register">Registrieren</a></span>
        </div>
    </section>
    
    <!-- Footer -->
    <footer>
        <nav>
            <ul>
                <li><a href="#header">Zurück zum Anfang</a></li>
                <li><a href="/myapp/impresum">Impressum</a></li>
                <li><a href="/myapp/dsgvo">Datenschutzerklärung</a></li>
                <li><a href="/myapp/haftung">Haftungsausschluss</a></li>
            </ul>
        </nav>
        <p>&copy; 2026 StudBoard. All rights reserved. Kontakt: <a href="mailto:studboard@hsbi.de">hier</a></p>        
    </footer>
</body>
</html>
